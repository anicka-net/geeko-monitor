<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Geeko Monitor</title>
<style>
  @font-face {
    font-family: 'SUSE';
    src: local('SUSE'), local('Verdana');
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0C322C;
    color: #FFFFFF;
    font-family: "SUSE", Verdana, sans-serif;
    font-weight: 400;
    font-size: 18px;
    min-height: 100vh;
  }
  .header {
    background: #0C322C;
    border-bottom: 3px solid #30BA78;
    padding: 20px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .header h1 {
    font-size: 36px;
    font-weight: 500;
    letter-spacing: -0.5px;
  }
  .header .subtitle {
    color: #EFEFEF;
    font-size: 14px;
    opacity: 0.8;
  }
  .header-right {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .header-time {
    color: #EFEFEF;
    font-size: 14px;
  }

  .container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 24px 32px;
  }

  /* Health status indicator */
  .health-bar {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 28px;
    padding: 16px 24px;
    background: #0F3D34;
    border-radius: 4px;
  }
  .health-circle {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .health-circle svg { width: 24px; height: 24px; }
  .health-circle.healthy { background: #30BA78; }
  .health-circle.degraded { background: #FE7C3F; }
  .health-circle.critical { background: #E04E39; }
  .health-label {
    font-size: 20px;
    font-weight: 500;
  }
  .health-detail {
    color: #EFEFEF;
    font-size: 14px;
    margin-top: 2px;
  }

  /* Gauge grid */
  .gauge-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 24px;
  }
  .card {
    background: #0F3D34;
    border-radius: 4px;
    padding: 20px;
    position: relative;
  }
  .card-title {
    font-size: 20px;
    font-weight: 500;
    margin-bottom: 12px;
    color: #EFEFEF;
  }
  .gauge-container {
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
  }
  .gauge-svg {
    width: 180px;
    height: 120px;
  }
  .gauge-value {
    font-size: 28px;
    font-weight: 500;
    margin-top: 4px;
  }
  .gauge-sub {
    color: #EFEFEF;
    font-size: 14px;
  }

  /* Probe card */
  .probe-display {
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    min-height: 140px;
  }
  .probe-value {
    font-size: 42px;
    font-weight: 500;
  }
  .probe-unit {
    font-size: 18px;
    color: #EFEFEF;
  }
  .probe-status {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 8px;
  }
  .status-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
  }
  .status-dot.ok { background: #30BA78; }
  .status-dot.fail { background: #E04E39; }
  .status-dot.disabled { background: #666; }

  /* Sections */
  .section {
    background: #0F3D34;
    border-radius: 4px;
    padding: 20px;
    margin-bottom: 24px;
  }
  .section-title {
    font-size: 20px;
    font-weight: 500;
    margin-bottom: 16px;
    color: #EFEFEF;
  }

  /* Temperature bars */
  .temp-bar-row {
    display: flex;
    align-items: center;
    margin-bottom: 10px;
    gap: 12px;
  }
  .temp-label {
    width: 140px;
    font-size: 14px;
    color: #EFEFEF;
    text-align: right;
    flex-shrink: 0;
  }
  .temp-bar-track {
    flex: 1;
    height: 18px;
    background: rgba(255,255,255,0.08);
    border-radius: 4px;
    overflow: hidden;
    position: relative;
  }
  .temp-bar-fill {
    height: 100%;
    background: #90EBCD;
    border-radius: 4px;
    transition: width 0.5s ease;
  }
  .temp-value {
    width: 60px;
    font-size: 14px;
    color: #FFFFFF;
    flex-shrink: 0;
  }
  .disabled-msg {
    color: #EFEFEF;
    font-size: 16px;
    opacity: 0.7;
    padding: 12px 0;
  }

  /* Network */
  .net-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
  }
  .net-item {
    text-align: center;
  }
  .net-label {
    color: #EFEFEF;
    font-size: 14px;
    margin-bottom: 4px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .net-value {
    font-size: 28px;
    font-weight: 500;
  }
  .net-rx { color: #30BA78; }
  .net-tx { color: #2453FF; }

  /* CPU chart */
  .chart-container {
    width: 100%;
    height: 180px;
  }
  .chart-container svg {
    width: 100%;
    height: 100%;
  }

  /* Connection lost overlay */
  .overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(12,50,44,0.92);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
  }
  .overlay-box {
    background: #0F3D34;
    border: 2px solid #FE7C3F;
    border-radius: 4px;
    padding: 40px 60px;
    text-align: center;
  }
  .overlay-box h2 {
    color: #FE7C3F;
    font-size: 24px;
    font-weight: 500;
    margin-bottom: 8px;
  }
  .overlay-box p {
    color: #EFEFEF;
    font-size: 16px;
  }
  .hidden { display: none !important; }

  /* Responsive */
  @media (max-width: 700px) {
    .gauge-grid { grid-template-columns: 1fr; }
    .net-grid { grid-template-columns: 1fr; }
    .container { padding: 16px; }
    .header { padding: 16px; }
    .header h1 { font-size: 24px; }
  }
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>Geeko Monitor</h1>
    <div class="subtitle">System Health Dashboard</div>
  </div>
  <div class="header-right">
    <div class="header-time" id="headerTime"></div>
  </div>
</div>

<div class="container">
  <!-- Health Status -->
  <div class="health-bar" id="healthBar">
    <div class="health-circle healthy" id="healthCircle">
      <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" id="healthIcon">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
    </div>
    <div>
      <div class="health-label" id="healthLabel">HEALTHY</div>
      <div class="health-detail" id="healthDetail">All systems operational</div>
    </div>
  </div>

  <!-- Gauge Grid -->
  <div class="gauge-grid">
    <!-- CPU -->
    <div class="card">
      <div class="card-title">CPU Usage</div>
      <div class="gauge-container">
        <svg class="gauge-svg" viewBox="0 0 180 120" id="cpuGauge"></svg>
        <div class="gauge-value" id="cpuValue">0%</div>
      </div>
    </div>
    <!-- Memory -->
    <div class="card">
      <div class="card-title">Memory Usage</div>
      <div class="gauge-container">
        <svg class="gauge-svg" viewBox="0 0 180 120" id="memGauge"></svg>
        <div class="gauge-value" id="memValue">0%</div>
        <div class="gauge-sub" id="memSub">0 / 0 MB</div>
      </div>
    </div>
    <!-- Disk -->
    <div class="card">
      <div class="card-title">Disk Usage</div>
      <div class="gauge-container">
        <svg class="gauge-svg" viewBox="0 0 180 120" id="diskGauge"></svg>
        <div class="gauge-value" id="diskValue">0%</div>
      </div>
    </div>
    <!-- Probe -->
    <div class="card">
      <div class="card-title">Probe Latency</div>
      <div class="probe-display">
        <div class="probe-value" id="probeValue">--</div>
        <div class="probe-unit" id="probeUnit">ms</div>
        <div class="probe-status">
          <div class="status-dot ok" id="probeDot"></div>
          <span id="probeLabel" style="font-size:14px;color:#EFEFEF;">OK</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Temperature -->
  <div class="section">
    <div class="section-title">Temperature</div>
    <div id="tempContent">
      <div class="disabled-msg">No data yet</div>
    </div>
  </div>

  <!-- Network -->
  <div class="section">
    <div class="section-title">Network</div>
    <div class="net-grid">
      <div class="net-item">
        <div class="net-label">Received (RX)</div>
        <div class="net-value net-rx" id="netRx">0 B</div>
      </div>
      <div class="net-item">
        <div class="net-label">Transmitted (TX)</div>
        <div class="net-value net-tx" id="netTx">0 B</div>
      </div>
    </div>
  </div>

  <!-- CPU History Chart -->
  <div class="section">
    <div class="section-title">CPU History</div>
    <div class="chart-container">
      <svg id="cpuChart" viewBox="0 0 800 180" preserveAspectRatio="none"></svg>
    </div>
  </div>
</div>

<!-- Connection Lost Overlay -->
<div class="overlay hidden" id="lostOverlay">
  <div class="overlay-box">
    <h2>Connection Lost</h2>
    <p>Unable to reach /api/data. Retrying...</p>
  </div>
</div>

<script>
(function() {
  'use strict';

  // SVG arc gauge renderer
  function renderArcGauge(svgEl, percent) {
    var clamped = Math.max(0, Math.min(100, percent));
    var cx = 90, cy = 95, r = 70;
    var startAngle = Math.PI;
    var endAngle = 2 * Math.PI;
    var sweepAngle = startAngle + (clamped / 100) * (endAngle - startAngle);

    // Color based on percentage
    var color;
    if (clamped < 60) color = '#30BA78';
    else if (clamped <= 85) color = '#FE7C3F';
    else color = '#E04E39';

    // Track arc
    var trackPath = describeArc(cx, cy, r, startAngle, endAngle);
    // Value arc
    var valuePath = describeArc(cx, cy, r, startAngle, sweepAngle);

    svgEl.innerHTML =
      '<path d="' + trackPath + '" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="14" stroke-linecap="round"/>' +
      '<path d="' + valuePath + '" fill="none" stroke="' + color + '" stroke-width="14" stroke-linecap="round">' +
        '<animate attributeName="d" dur="0.5s" fill="freeze"/>' +
      '</path>';
  }

  function describeArc(cx, cy, r, startAngle, endAngle) {
    if (Math.abs(endAngle - startAngle) < 0.001) {
      // Negligible arc
      var sx = cx + r * Math.cos(startAngle);
      var sy = cy + r * Math.sin(startAngle);
      return 'M ' + sx + ' ' + sy;
    }
    var sx = cx + r * Math.cos(startAngle);
    var sy = cy + r * Math.sin(startAngle);
    var ex = cx + r * Math.cos(endAngle);
    var ey = cy + r * Math.sin(endAngle);
    var largeArc = (endAngle - startAngle > Math.PI) ? 1 : 0;
    return 'M ' + sx + ' ' + sy + ' A ' + r + ' ' + r + ' 0 ' + largeArc + ' 1 ' + ex + ' ' + ey;
  }

  // CPU history chart renderer
  function renderCPUChart(svgEl, history) {
    if (!history || history.length === 0) {
      svgEl.innerHTML = '<text x="400" y="90" text-anchor="middle" fill="#EFEFEF" font-size="14" font-family="SUSE,Verdana,sans-serif">Waiting for data...</text>';
      return;
    }

    var w = 800, h = 180;
    var padL = 40, padR = 10, padT = 10, padB = 30;
    var plotW = w - padL - padR;
    var plotH = h - padT - padB;

    var html = '';

    // Grid lines and labels
    for (var g = 0; g <= 100; g += 25) {
      var gy = padT + plotH - (g / 100) * plotH;
      html += '<line x1="' + padL + '" y1="' + gy + '" x2="' + (w - padR) + '" y2="' + gy + '" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>';
      html += '<text x="' + (padL - 6) + '" y="' + (gy + 4) + '" text-anchor="end" fill="#EFEFEF" font-size="11" font-family="SUSE,Verdana,sans-serif">' + g + '%</text>';
    }

    // Build line points
    var n = history.length;
    var maxSlots = 60;
    var points = [];
    for (var i = 0; i < n; i++) {
      var x = padL + (i / (maxSlots - 1)) * plotW;
      var y = padT + plotH - (history[i].cpu_percent / 100) * plotH;
      points.push(x + ',' + y);
    }
    var linePoints = points.join(' ');

    // Area fill
    var firstX = padL + (0 / (maxSlots - 1)) * plotW;
    var lastX = padL + ((n - 1) / (maxSlots - 1)) * plotW;
    var baseY = padT + plotH;
    var areaPoints = firstX + ',' + baseY + ' ' + linePoints + ' ' + lastX + ',' + baseY;
    html += '<polygon points="' + areaPoints + '" fill="#30BA78" fill-opacity="0.2"/>';

    // Line
    html += '<polyline points="' + linePoints + '" fill="none" stroke="#2453FF" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>';

    // Dots on last few points
    if (n > 0) {
      var lastIdx = n - 1;
      var lx = padL + (lastIdx / (maxSlots - 1)) * plotW;
      var ly = padT + plotH - (history[lastIdx].cpu_percent / 100) * plotH;
      html += '<circle cx="' + lx + '" cy="' + ly + '" r="4" fill="#2453FF" stroke="#0F3D34" stroke-width="2"/>';
    }

    svgEl.innerHTML = html;
  }

  function formatBytes(b) {
    if (b >= 1099511627776) return (b / 1099511627776).toFixed(2) + ' TB';
    if (b >= 1073741824) return (b / 1073741824).toFixed(2) + ' GB';
    if (b >= 1048576) return (b / 1048576).toFixed(2) + ' MB';
    if (b >= 1024) return (b / 1024).toFixed(2) + ' KB';
    return b + ' B';
  }

  function updateHealthStatus(status) {
    var circle = document.getElementById('healthCircle');
    var icon = document.getElementById('healthIcon');
    var label = document.getElementById('healthLabel');
    var detail = document.getElementById('healthDetail');

    circle.className = 'health-circle';
    if (status === 'HEALTHY') {
      circle.classList.add('healthy');
      icon.innerHTML = '<polyline points="20 6 9 17 4 12"/>';
      label.textContent = 'HEALTHY';
      detail.textContent = 'All systems operational';
    } else if (status === 'DEGRADED') {
      circle.classList.add('degraded');
      icon.innerHTML = '<path d="M12 9v4"/><circle cx="12" cy="16" r="0.5"/><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>';
      label.textContent = 'DEGRADED';
      detail.textContent = 'Some metrics elevated';
    } else {
      circle.classList.add('critical');
      icon.innerHTML = '<line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>';
      label.textContent = 'CRITICAL';
      detail.textContent = 'Immediate attention required';
    }
  }

  function updateTemperatures(data) {
    var container = document.getElementById('tempContent');
    var temps = data.current.temperatures;
    var enabled = data.current.enabled_metrics;
    var tempEnabled = enabled && enabled.indexOf('TEMPERATURE') !== -1;

    if (!tempEnabled) {
      container.innerHTML = '<div class="disabled-msg">Temperature monitoring disabled</div>';
      return;
    }

    if (!temps || temps.length === 0) {
      container.innerHTML = '<div class="disabled-msg">No thermal zones detected</div>';
      return;
    }

    var html = '';
    for (var i = 0; i < temps.length; i++) {
      var t = temps[i];
      var pct = Math.min(100, (t.celsius / 105) * 100);
      html += '<div class="temp-bar-row">' +
        '<div class="temp-label">' + t.zone + '</div>' +
        '<div class="temp-bar-track"><div class="temp-bar-fill" style="width:' + pct + '%"></div></div>' +
        '<div class="temp-value">' + t.celsius.toFixed(1) + ' \u00B0C</div>' +
      '</div>';
    }
    container.innerHTML = html;
  }

  function updateProbe(data) {
    var probeEnabled = data.current.enabled_metrics && data.current.enabled_metrics.indexOf('PROBE') !== -1;
    var valEl = document.getElementById('probeValue');
    var unitEl = document.getElementById('probeUnit');
    var dotEl = document.getElementById('probeDot');
    var labelEl = document.getElementById('probeLabel');

    if (!probeEnabled) {
      valEl.textContent = '--';
      unitEl.textContent = '';
      dotEl.className = 'status-dot disabled';
      labelEl.textContent = 'disabled';
      return;
    }

    if (data.current.probe_ok) {
      valEl.textContent = data.current.probe_latency_ms;
      unitEl.textContent = 'ms';
      dotEl.className = 'status-dot ok';
      labelEl.textContent = 'Reachable';
    } else {
      valEl.textContent = '--';
      unitEl.textContent = '';
      dotEl.className = 'status-dot fail';
      labelEl.textContent = 'Unreachable';
    }
  }

  function updateDashboard(data) {
    if (!data || !data.current) return;

    // Health status
    updateHealthStatus(data.status);

    // CPU gauge
    var cpuPct = data.current.cpu_percent;
    renderArcGauge(document.getElementById('cpuGauge'), cpuPct);
    document.getElementById('cpuValue').textContent = cpuPct.toFixed(1) + '%';

    // Memory gauge
    var memPct = 0;
    if (data.current.mem_total_mb > 0) {
      memPct = (data.current.mem_used_mb / data.current.mem_total_mb) * 100;
    }
    renderArcGauge(document.getElementById('memGauge'), memPct);
    document.getElementById('memValue').textContent = memPct.toFixed(1) + '%';
    document.getElementById('memSub').textContent =
      data.current.mem_used_mb + ' / ' + data.current.mem_total_mb + ' MB';

    // Disk gauge
    var diskPct = data.current.disk_used_percent;
    renderArcGauge(document.getElementById('diskGauge'), diskPct);
    document.getElementById('diskValue').textContent = diskPct.toFixed(1) + '%';

    // Probe
    updateProbe(data);

    // Temperature
    updateTemperatures(data);

    // Network
    document.getElementById('netRx').textContent = formatBytes(data.current.net_rx_bytes);
    document.getElementById('netTx').textContent = formatBytes(data.current.net_tx_bytes);

    // CPU history chart
    renderCPUChart(document.getElementById('cpuChart'), data.history);

    // Header time
    if (data.current.timestamp) {
      var d = new Date(data.current.timestamp);
      document.getElementById('headerTime').textContent = d.toLocaleTimeString();
    }
  }

  var failCount = 0;

  function fetchData() {
    fetch('/api/data')
      .then(function(resp) {
        if (!resp.ok) throw new Error('HTTP ' + resp.status);
        return resp.json();
      })
      .then(function(data) {
        failCount = 0;
        document.getElementById('lostOverlay').classList.add('hidden');
        updateDashboard(data);
      })
      .catch(function(err) {
        failCount++;
        if (failCount >= 2) {
          document.getElementById('lostOverlay').classList.remove('hidden');
        }
      });
  }

  // Initial fetch and then every 5 seconds
  fetchData();
  setInterval(fetchData, 5000);
})();
</script>
</body>
</html>
